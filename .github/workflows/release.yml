name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@helloagentai/openclaw
    permissions:
      id-token: write   # for provenance attestations (works with token auth too)
      contents: write   # for GitHub release creation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish
        run: npm publish --access=public --provenance
        env:
          # Granular access token, scoped to @helloagentai/*. Once npm trusted
          # publishing is configured for this repo+workflow+environment, the
          # token can be removed and OIDC will take over automatically.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
